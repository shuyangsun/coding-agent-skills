# Git hooks managed by lefthook (https://lefthook.dev).
#
# `bun install` runs `lefthook install` (via the package.json "prepare"
# script), which wires .git/hooks/* to this file. On each `git commit`, staged
# files are first formatted with the repo-pinned Prettier (fixes re-staged
# automatically), then linted so a commit fails on any structural issue
# Prettier doesn't fix:
#   • Markdown → Prettier, then markdownlint.
#   • Code + JSON (js/jsx/ts/tsx/json/jsonc/css) → Prettier, then oxlint
#     (--fix) on the code subset. Prettier owns JSON; oxlint lints code.
# The jobs run sequentially (not in parallel) so two tools never write the same
# staged file at once.
#
# NOTE: Jujutsu (jj) does not run Git hooks — commits are created implicitly and
# must stay fast, so jj deliberately has no commit-hook mechanism. The jj-native
# equivalent is `jj fix`, configured by scripts/setup-vcs-hooks.sh. `jj fix`
# only hosts stdin→stdout formatters, so it runs Prettier on Markdown, code, and
# JSON; the whole-file linters (markdownlint, oxlint) run via `bun run lint:md`
# and `bun run lint:code`. Run the setup script once per clone to enable
# formatting under jj.
pre-commit:
  parallel: false
  jobs:
    - name: prettier-markdown
      glob: "*.md"
      run: bunx prettier --write {staged_files}
      stage_fixed: true
    - name: markdownlint
      glob: "*.md"
      run: bunx markdownlint-cli2 --fix {staged_files}
      stage_fixed: true
    - name: prettier-code
      glob: "*.{js,jsx,mjs,cjs,ts,tsx,mts,cts,json,jsonc,css}"
      run: bunx prettier --write {staged_files}
      stage_fixed: true
    - name: oxlint
      glob: "*.{js,jsx,mjs,cjs,ts,tsx,mts,cts}"
      run: bunx oxlint --fix {staged_files}
      stage_fixed: true
